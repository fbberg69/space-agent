services:
  space-agent:
    image: node:22-alpine
    container_name: space-agent
    working_dir: /app
    volumes:
      - ./app:/app/app:cached
      - ./commands:/app/commands:cached
      - ./server:/app/server:cached
      - ./scripts:/app/scripts:cached
      - ./space:/app/space:cached
      - ./space.js:/app/space.js:cached
      - ./package.json:/app/package.json:cached
      - ./data:/app/data:rw
      - ./customware:/srv/space/customware:rw
      - space_agent_supervisor:/app/supervisor
      - space_agent_node_modules:/app/node_modules
    ports:
      - "3010:3000"
      - "3011:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - CUSTOMWARE_PATH=/srv/space/customware
      - HOST=0.0.0.0
      - PORT=3000
    command: >
      sh -c "
        apk add --no-cache git curl &&
        npm install --omit=dev --silent &&
        exec node space serve HOST=0.0.0.0 PORT=3000
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s

volumes:
  space_agent_supervisor:
  space_agent_node_modules: